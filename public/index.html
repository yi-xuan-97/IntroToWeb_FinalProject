    <!-- ============= Search Engine Indexing ============= -->
    <!-- noindex,nofollow keeps this site OUT of Google / Bing search results.
         Active during the contractor-period job search so coworkers searching
         my name don't stumble onto the portfolio. The site stays publicly
         accessible — anyone with the direct URL can visit — it just won't
         appear in search engines.
         REMOVE THIS META TAG once it's safe to be discoverable (i.e. after
         I'm no longer worried about coworker discovery). -->
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Yixuan — full-stack developer at Corteva Agriscience. Building .NET 8 + Angular features with BDD/TDD. Personal site, portfolio, and contact."
    />
    <meta name="author" content="Yixuan" />

    <!-- ============= Open Graph (Facebook / LinkedIn / Slack / iMessage) ============= -->

    <meta property="og:site_name" content="Yixuan" />
    <meta property="og:url" content="https://yixuan-feng.vercel.app/" />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Golos+Text:wght@400;500;600;700&family=Mynerve&family=Outfit:wght@500;600;700;800&family=Shantell+Sans:ital,wght@1,500&display=swap" rel="stylesheet">

    <title>Yixuan — Full Stack Developer</title>

    <!-- Inline dark-mode bootstrap.
         Runs BEFORE React hydrates so the <html> class is set before paint.
         Prevents a "flash of light theme" when a dark-pref user lands. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) { /* noop */ }
      })();
    </script>
